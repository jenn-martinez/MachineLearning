<!DOCTYPE html>
<html>
<head>
    <title>Regresión Logística</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        input { padding: 8px; margin: 5px 0; width: 250px; display: block; }
        button { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; margin-top: 10px; }
        .resultado { font-size: 24px; font-weight: bold; margin-top: 20px; }
        label { margin-top: 10px; display: block; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Predicción de Compra</h1>
    <form method="POST">
        <label>Edad:</label>
        <input type="number" name="edad" placeholder="Ej: 35" required>

        <label>Ingreso Mensual:</label>
        <input type="number" name="ingreso_mensual" placeholder="Ej: 3000000" required>

        <label>Visitas Web por Mes:</label>
        <input type="number" name="visitas_web_mes" placeholder="Ej: 10" required>

        <label>Tiempo en Sitio (minutos):</label>
        <input type="number" step="0.1" name="tiempo_sitio_min" placeholder="Ej: 15.5" required>

        <label>Compras Previas:</label>
        <input type="number" name="compras_previas" placeholder="Ej: 5" required>

        <label>¿Usó Descuento? (0 = No, 1 = Sí):</label>
        <input type="number" name="descuento_usado" placeholder="0 o 1" min="0" max="1" required>

        <button type="submit">Predecir</button>
    </form>

    {% if prediccion %}
    <p class="resultado">Resultado: {{ prediccion }}</p>
    {% endif %}

</body>
</html>
