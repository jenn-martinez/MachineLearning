<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classification Perceptron Application</title>
    <link rel = "stylesheet" href="{{url_for('static',filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% include "navbar.html"%}
    {% block content%}
    <div class="container">
        <h2>Evaluation Metrics - Perceptron </h2>

        <div class="metric-grid">
            <div class="card">
                <h4>Accuracy</h4>
                <p>{{ metrics.accuracy}}</p>
            </div>
            <div class="card">
                <h4>Recall</h4>
                <p> {{ metrics.recall}}</p>
            </div>
            <div class="card">
                <h4>F1-Score</h4>
                <p>{{metrics.f1}}</p>
            </div>
        </div>

        <hr>
        <h3>Confusion Matrix</h3>
        <img src="data:image/png;base64,{{ plot_url_cm }}" alt="Matriz de Confusión" style="max-width: 100%;">

        <h3>Curve ROC / AUC</h3>
        <img src="data:image/png;base64,{{ plot_url_roc }}" alt="Curva ROC" style="max-width: 100%;">

    </div>
    {% endblock%}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
