<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classification Perceptron Application</title>
    <link rel = "stylesheet" href="{{url_for('static',filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% include "navbar.html"%}
    {% block content%}
    <div class="container">
        <h2>Diagnostic Prediction (Breast Cancer) </h2>
        <p>Enter the average cell mass values for a diagnosis:</p>

        <form action="/predict_perceptron" method="POST">
            <label>Average radius</label>
            <input type="number" step="0.01" name="radius" required>

            <label>Average texture</label>
            <input type="number" step="0.01" name="texture" required>

            <label>Average Perimeter</label>
            <input type="number" step="0.01" name="perimeter" required>

            <label>Average Area</label>
            <input type="number" step="0.01" name="area" required>

            <button type="submit">Make a Prediction</button>
        </form>
        {% if prediction%}
        <div class="result">
            <h3>Result: {{"Malignant if prediction == 1 else "Beningn"}}</h3>
        </div>
        {% endif %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% endblock%}
</body>
</html>
